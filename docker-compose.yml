services:
  postgres:
    image: postgres:16-alpine
    container_name: moex-terminal-postgres
    environment:
      POSTGRES_USER: terminal
      POSTGRES_PASSWORD: terminal
      POSTGRES_DB: terminal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
volumes:
  pgdata:
